<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" fill="none">
  <defs>
    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.08" />
    </filter>

    <!-- Road Left Gradients -->
    <linearGradient id="roadLeftGradient" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="50%" stop-color="#A5B4FC" />
      <stop offset="100%" stop-color="#C7D2FE" />
    </linearGradient>
    <linearGradient id="roadLeftGlow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#C7D2FE" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#E0E7FF" stop-opacity="0.4" />
    </linearGradient>

    <!-- Road Right Gradients -->
    <linearGradient id="roadRightGradient" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="50%" stop-color="#67E8F9" />
      <stop offset="100%" stop-color="#A5F3FC" />
    </linearGradient>
    <linearGradient id="roadRightGlow" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#A5F3FC" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#E0F2FE" stop-opacity="0.4" />
    </linearGradient>

    <!-- Glow Gradients -->
    <radialGradient id="glowBlue" cx="20%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowTeal" cx="80%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0" />
    </radialGradient>

    <!-- Reusable Location Pin -->
    <g id="pin">
      <ellipse cx="0" cy="0" rx="10" ry="3.5" fill="currentColor" opacity="0.25" />
      <circle cx="0" cy="-22" r="14" fill="currentColor" opacity="0.12" />
      <path d="M0 0 C-9 -9 -14 -18 -14 -27 A14 14 0 1 1 14 -27 C14 -18 9 -9 0 0 Z" fill="currentColor" />
      <circle cx="0" cy="-27" r="4.5" fill="#FFFFFF" />
    </g>
  </defs>

  <!-- BACKGROUND GLOWS -->
  <rect width="1920" height="800" fill="url(#glowBlue)" />
  <rect width="1920" height="800" fill="url(#glowTeal)" />

  <!-- MOUNTAIN SILHOUETTES (LEFT) -->
  <g fill="#4F46E5" opacity="0.04" transform="translate(0, 240)">
    <path d="M-100,360 L120,180 L290,260 L460,120 L620,290 L750,220 L900,360 Z" />
    <path d="M-50,360 L200,200 L380,280 L580,150 L800,360 Z" opacity="0.6" />
  </g>

  <!-- CITY SKYLINE SILHOUETTES (RIGHT) -->
  <g fill="#06B6D4" opacity="0.04" transform="translate(1300, 360)">
    <rect x="0" y="70" width="35" height="130" />
    <rect x="40" y="20" width="45" height="180" />
    <polygon points="40,20 62.5,-10 85,20" />
    <rect x="95" y="90" width="30" height="110" />
    <rect x="135" y="40" width="40" height="160" />
    <rect x="185" y="10" width="50" height="190" />
    <polygon points="185,10 210,-20 235,10" />
    <rect x="245" y="80" width="30" height="120" />
  </g>

  <!-- DOT GRIDS -->
  <!-- Left Dot Grid -->
  <g fill="#4F46E5" opacity="0.2">
    <circle cx="80" cy="100" r="2" /><circle cx="96" cy="100" r="2" /><circle cx="112" cy="100" r="2" /><circle cx="128" cy="100" r="2" /><circle cx="144" cy="100" r="2" />
    <circle cx="80" cy="116" r="2" /><circle cx="96" cy="116" r="2" /><circle cx="112" cy="116" r="2" /><circle cx="128" cy="116" r="2" /><circle cx="144" cy="116" r="2" />
    <circle cx="80" cy="132" r="2" /><circle cx="96" cy="132" r="2" /><circle cx="112" cy="132" r="2" /><circle cx="128" cy="132" r="2" /><circle cx="144" cy="132" r="2" />
    <circle cx="80" cy="148" r="2" /><circle cx="96" cy="148" r="2" /><circle cx="112" cy="148" r="2" /><circle cx="128" cy="148" r="2" /><circle cx="144" cy="148" r="2" />
    <circle cx="80" cy="164" r="2" /><circle cx="96" cy="164" r="2" /><circle cx="112" cy="164" r="2" /><circle cx="128" cy="164" r="2" /><circle cx="144" cy="164" r="2" />
  </g>
  <!-- Right Dot Grid -->
  <g fill="#06B6D4" opacity="0.2">
    <circle cx="1776" cy="100" r="2" /><circle cx="1792" cy="100" r="2" /><circle cx="1808" cy="100" r="2" /><circle cx="1824" cy="100" r="2" /><circle cx="1840" cy="100" r="2" />
    <circle cx="1776" cy="116" r="2" /><circle cx="1792" cy="116" r="2" /><circle cx="1808" cy="116" r="2" /><circle cx="1824" cy="116" r="2" /><circle cx="1840" cy="116" r="2" />
    <circle cx="1776" cy="132" r="2" /><circle cx="1792" cy="132" r="2" /><circle cx="1808" cy="132" r="2" /><circle cx="1824" cy="132" r="2" /><circle cx="1840" cy="132" r="2" />
    <circle cx="1776" cy="148" r="2" /><circle cx="1792" cy="148" r="2" /><circle cx="1808" cy="148" r="2" /><circle cx="1824" cy="148" r="2" /><circle cx="1840" cy="148" r="2" />
    <circle cx="1776" cy="164" r="2" /><circle cx="1792" cy="164" r="2" /><circle cx="1808" cy="164" r="2" /><circle cx="1824" cy="164" r="2" /><circle cx="1840" cy="164" r="2" />
  </g>

  <!-- WINDING ROADS -->
  <!-- Left Road Curve -->
  <g>
    <!-- Outer Glow -->
    <path d="M -150 850 C 200 750, -50 450, 180 200" fill="none" stroke="url(#roadLeftGlow)" stroke-width="108" stroke-linecap="round" opacity="0.3" />
    <!-- Main Road Surface -->
    <path d="M -150 850 C 200 750, -50 450, 180 200" fill="none" stroke="url(#roadLeftGradient)" stroke-width="100" stroke-linecap="round" opacity="0.2" />
    <!-- Center Dash Line -->
    <path d="M -150 850 C 200 750, -50 450, 180 200" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-dasharray="14 18" opacity="0.8" stroke-linecap="round" />
  </g>

  <!-- Right Road Curve -->
  <g>
    <!-- Outer Glow -->
    <path d="M 2070 850 C 1720 750, 1970 450, 1740 200" fill="none" stroke="url(#roadRightGlow)" stroke-width="108" stroke-linecap="round" opacity="0.3" />
    <!-- Main Road Surface -->
    <path d="M 2070 850 C 1720 750, 1970 450, 1740 200" fill="none" stroke="url(#roadRightGradient)" stroke-width="100" stroke-linecap="round" opacity="0.2" />
    <!-- Center Dash Line -->
    <path d="M 2070 850 C 1720 750, 1970 450, 1740 200" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-dasharray="14 18" opacity="0.8" stroke-linecap="round" />
  </g>

  <!-- LOCATION PINS ON ROADS -->
  <!-- Left Road Pins -->
  <use href="#pin" x="180" y="200" fill="#4F46E5" />
  <use href="#pin" x="140" y="430" fill="#6366F1" />
  <use href="#pin" x="40" y="650" fill="#8B5CF6" />
  
  <!-- Right Road Pins -->
  <use href="#pin" x="1740" y="200" fill="#0891B2" />
  <use href="#pin" x="1780" y="430" fill="#06B6D4" />
  <use href="#pin" x="1880" y="650" fill="#2DD4BF" />

  <!-- FLOATING ICONS OVERLAYS -->
  <!-- 1. Bus Icon Group (Left Side) -->
  <g transform="translate(560, 260)" filter="url(#shadow)" class="text-blue-600">
    <circle cx="0" cy="0" r="28" fill="white" />
    <circle cx="0" cy="0" r="28" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.2" />
    <g transform="translate(-1, -1) scale(0.9)">
      <path d="M-8 -8 H8 A2 2 0 0 1 10 -6 V4 A2 2 0 0 1 8 6 H-8 A2 2 0 0 1 -10 4 V-6 A2 2 0 0 1 -8 -8 Z" stroke="#2563EB" stroke-width="2" fill="none" stroke-linejoin="round" />
      <path d="M-10 0 H10 M-6 6 L-6 9 M6 6 L6 9" stroke="#2563EB" stroke-width="2" stroke-linecap="round" />
      <circle cx="-4" cy="3" r="1.5" fill="#2563EB" />
      <circle cx="4" cy="3" r="1.5" fill="#2563EB" />
    </g>
  </g>

  <!-- 2. Ticket Icon Group (Top Middle-Right) -->
  <g transform="translate(1130, 240)" filter="url(#shadow)" class="text-purple-600">
    <circle cx="0" cy="0" r="28" fill="white" />
    <circle cx="0" cy="0" r="28" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.2" />
    <g transform="rotate(-25) scale(0.95)">
      <rect x="-12" y="-7" width="24" height="14" rx="1.5" stroke="#7C3AED" stroke-width="2" fill="none" />
      <path d="M-12 -2 A 2 2 0 0 1 -12 2 M12 -2 A 2 2 0 0 0 12 2" stroke="#7C3AED" stroke-width="2" fill="none" />
      <path d="M0 -3 V3" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="2 2" />
    </g>
  </g>

  <!-- 3. Headphones Icon Group (Middle Right) -->
  <g transform="translate(1480, 440)" filter="url(#shadow)" class="text-cyan-600">
    <circle cx="0" cy="0" r="28" fill="white" />
    <circle cx="0" cy="0" r="28" fill="none" stroke="#0891B2" stroke-width="1" opacity="0.2" />
    <g transform="scale(0.9)">
      <path d="M-9 2 A9 9 0 0 1 9 2" stroke="#0891B2" stroke-width="2" fill="none" stroke-linecap="round" />
      <rect x="-11" y="-1" width="3" height="7" rx="1" stroke="#0891B2" stroke-width="2" fill="none" />
      <rect x="8" y="-1" width="3" height="7" rx="1" stroke="#0891B2" stroke-width="2" fill="none" />
    </g>
  </g>

  <!-- 4. Suitcase Icon Group (Bottom Left) -->
  <g transform="translate(680, 560)" filter="url(#shadow)" class="text-purple-500">
    <circle cx="0" cy="0" r="28" fill="white" />
    <circle cx="0" cy="0" r="28" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.2" />
    <g transform="scale(0.9)">
      <rect x="-10" y="-6" width="20" height="14" rx="2" stroke="#8B5CF6" stroke-width="2" fill="none" />
      <path d="M-4 -6 V-9 H4 V-6" stroke="#8B5CF6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M-10 -1 H10" stroke="#8B5CF6" stroke-width="1.5" />
    </g>
  </g>

  <!-- 5. Seat Icon Group (Bottom Right) -->
  <g transform="translate(1150, 560)" filter="url(#shadow)" class="text-cyan-500">
    <circle cx="0" cy="0" r="28" fill="white" />
    <circle cx="0" cy="0" r="28" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.2" />
    <g transform="scale(0.9)">
      <path d="M-5 -8 H5 V2 H-5 Z" stroke="#06B6D4" stroke-width="2" fill="none" stroke-linejoin="round" />
      <path d="M-8 -1 H-5 M5 -1 H8" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" />
      <path d="M-4 2 V6 M4 2 V6" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" />
    </g>
  </g>

  <!-- USER-PROVIDED SVG OVERLAY PATHS AND BUSES -->
  <!-- Left Bus (Realistic) -->
  <image href="/bus-1.png" x="-15" y="-15" width="150" height="75" transform="translate(180 500) rotate(-20)" />

  <!-- Right Bus (Realistic) -->
  <image href="/bus-5.png" x="-20" y="-20" width="180" height="90" transform="translate(1610 470) rotate(18)" />

  <!-- Flight Path -->
  <path
   d="M450 90 C700 30 1100 30 1450 110"
   stroke="#93C5FD"
   stroke-width="3"
   stroke-dasharray="10 12"
   fill="none"
   opacity="0.6"
  />

  <!-- Airplane Glyphs / Icon -->
  <text x="1450" y="110"
        font-size="26"
        opacity="0.5">
    ✈
  </text>

  <!-- Blue solid circles -->
  <g fill="#2563EB">
    <circle cx="250" cy="350" r="10"/>
    <circle cx="350" cy="180" r="10"/>
  </g>

  <!-- Cyan solid circles -->
  <g fill="#06B6D4">
    <circle cx="1700" cy="340" r="10"/>
    <circle cx="1600" cy="180" r="10"/>
  </g>
</svg>
